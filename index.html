<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>田园小农场 - 挂机种菜游戏</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        grass: '#4CAF50',
                        'grass-light': '#8BC34A',
                        soil: '#8B4513',
                        'soil-light': '#D2691E',
                        sky: '#87CEEB',
                        gold: '#FFD700',
                        'gold-dark': '#FFA500',
                    },
                    fontFamily: {
                        cute: ['ZCOOL KuaiLe', 'cursive'],
                    }
                }
            }
        }
    </script>
</head>
<body class="font-cute bg-gradient-to-b from-sky via-green-100 to-grass-light min-h-screen overflow-x-hidden">
    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col relative">
        
        <div id="decorations" class="fixed inset-0 pointer-events-none overflow-hidden">
            <div class="sun absolute top-4 right-4 w-16 h-16 bg-yellow-300 rounded-full shadow-lg animate-pulse"></div>
            <div class="cloud cloud-1 absolute top-12 left-4 opacity-80"></div>
            <div class="cloud cloud-2 absolute top-20 right-8 opacity-60"></div>
            <div class="cloud cloud-3 absolute top-8 left-1/3 opacity-70"></div>
        </div>

        <header class="bg-gradient-to-r from-grass to-grass-light text-white p-4 rounded-b-3xl shadow-lg relative z-10">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <span class="text-3xl">🌾</span>
                    <h1 class="text-xl font-bold">田园小农场</h1>
                </div>
                <div class="flex items-center gap-4">
                    <div id="coinDisplay" class="bg-white/20 backdrop-blur-sm rounded-full px-4 py-2 flex items-center gap-2">
                        <span class="text-2xl">🪙</span>
                        <span id="coinAmount" class="text-lg font-bold">100</span>
                    </div>
                    <button id="settingsBtn" class="text-2xl hover:scale-110 transition-transform">⚙️</button>
                </div>
            </div>
        </header>

        <main class="flex-1 p-4 relative z-10">
            <div id="farmArea" class="bg-gradient-to-b from-grass-light/30 to-grass/20 rounded-3xl p-4 shadow-inner border-2 border-white/50">
                <div id="plotGrid" class="grid grid-cols-3 gap-3">
                </div>
            </div>

            <div id="selectedPlotInfo" class="mt-4 bg-white/80 backdrop-blur-sm rounded-2xl p-4 shadow-lg hidden">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-lg font-bold text-soil">地块信息</h3>
                    <button id="closePlotInfo" class="text-gray-500 hover:text-gray-700 text-xl">✕</button>
                </div>
                <div id="plotContent" class="text-center">
                </div>
            </div>
        </main>

        <div id="actionPanel" class="bg-white/90 backdrop-blur-sm rounded-t-3xl p-4 shadow-2xl relative z-10">
            <div class="flex justify-around gap-2">
                <button id="plantBtn" class="action-btn flex-1 bg-grass hover:bg-grass-light text-white rounded-2xl py-3 px-4 flex flex-col items-center gap-1 transition-all hover:scale-105 active:scale-95 shadow-md">
                    <span class="text-2xl">🌱</span>
                    <span class="text-sm">播种</span>
                </button>
                <button id="harvestBtn" class="action-btn flex-1 bg-gold hover:bg-gold-dark text-white rounded-2xl py-3 px-4 flex flex-col items-center gap-1 transition-all hover:scale-105 active:scale-95 shadow-md">
                    <span class="text-2xl">🌾</span>
                    <span class="text-sm">收割</span>
                </button>
                <button id="speedUpBtn" class="action-btn flex-1 bg-sky hover:bg-blue-400 text-white rounded-2xl py-3 px-4 flex flex-col items-center gap-1 transition-all hover:scale-105 active:scale-95 shadow-md">
                    <span class="text-2xl">⚡</span>
                    <span class="text-sm">加速</span>
                </button>
            </div>
        </div>

        <nav class="bg-white/95 backdrop-blur-sm border-t border-gray-200 p-3 relative z-10">
            <div class="flex justify-around">
                <button id="shopNavBtn" class="nav-btn flex flex-col items-center gap-1 px-6 py-2 rounded-xl transition-all hover:bg-grass-light/20">
                    <span class="text-2xl">🏪</span>
                    <span class="text-xs text-gray-600">商店</span>
                </button>
                <button id="inventoryNavBtn" class="nav-btn flex flex-col items-center gap-1 px-6 py-2 rounded-xl transition-all hover:bg-grass-light/20">
                    <span class="text-2xl">🎒</span>
                    <span class="text-xs text-gray-600">仓库</span>
                </button>
                <button id="seedsNavBtn" class="nav-btn flex flex-col items-center gap-1 px-6 py-2 rounded-xl transition-all hover:bg-grass-light/20">
                    <span class="text-2xl">🌰</span>
                    <span class="text-xs text-gray-600">种子</span>
                </button>
            </div>
        </nav>
    </div>

    <div id="shopModal" class="modal fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex items-end justify-center">
        <div class="modal-content bg-white w-full max-w-md rounded-t-3xl p-6 transform translate-y-full transition-transform duration-300">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold text-soil">🏪 商店</h2>
                <button class="close-modal text-2xl text-gray-500 hover:text-gray-700">✕</button>
            </div>
            <div class="flex gap-2 mb-4">
                <button class="shop-tab active flex-1 py-2 rounded-xl bg-grass text-white transition-all" data-tab="seeds">🌱 种子</button>
                <button class="shop-tab flex-1 py-2 rounded-xl bg-gray-200 text-gray-600 transition-all" data-tab="plots">🟫 土地</button>
                <button class="shop-tab flex-1 py-2 rounded-xl bg-gray-200 text-gray-600 transition-all" data-tab="items">⚡ 道具</button>
            </div>
            <div id="shopContent" class="max-h-64 overflow-y-auto">
            </div>
        </div>
    </div>

    <div id="inventoryModal" class="modal fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex items-end justify-center">
        <div class="modal-content bg-white w-full max-w-md rounded-t-3xl p-6 transform translate-y-full transition-transform duration-300">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold text-soil">🎒 仓库</h2>
                <button class="close-modal text-2xl text-gray-500 hover:text-gray-700">✕</button>
            </div>
            <div id="inventoryContent" class="grid grid-cols-4 gap-3 max-h-48 overflow-y-auto mb-4">
            </div>
            <button id="sellAllBtn" class="w-full bg-gold hover:bg-gold-dark text-white rounded-2xl py-3 text-lg font-bold transition-all hover:scale-105 active:scale-95 shadow-md flex items-center justify-center gap-2">
                <span>💰</span>
                <span>一键售卖全部</span>
                <span id="totalSellValue">(0金币)</span>
            </button>
        </div>
    </div>

    <div id="seedsModal" class="modal fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex items-end justify-center">
        <div class="modal-content bg-white w-full max-w-md rounded-t-3xl p-6 transform translate-y-full transition-transform duration-300">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold text-soil">🌰 我的种子</h2>
                <button class="close-modal text-2xl text-gray-500 hover:text-gray-700">✕</button>
            </div>
            <div id="seedsContent" class="grid grid-cols-4 gap-3 max-h-64 overflow-y-auto">
            </div>
        </div>
    </div>

    <div id="plantModal" class="modal fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex items-end justify-center">
        <div class="modal-content bg-white w-full max-w-md rounded-t-3xl p-6 transform translate-y-full transition-transform duration-300">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold text-soil">🌱 选择种子</h2>
                <button class="close-modal text-2xl text-gray-500 hover:text-gray-700">✕</button>
            </div>
            <div id="plantSeedsContent" class="grid grid-cols-3 gap-3 max-h-64 overflow-y-auto">
            </div>
        </div>
    </div>

    <div id="settingsModal" class="modal fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="modal-content bg-white w-full max-w-sm rounded-3xl p-6 transform scale-95 opacity-0 transition-all duration-300">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-soil">⚙️ 设置</h2>
                <button class="close-modal text-2xl text-gray-500 hover:text-gray-700">✕</button>
            </div>
            <div class="space-y-4">
                <div class="flex justify-between items-center p-3 bg-gray-100 rounded-xl">
                    <span>游戏音效</span>
                    <button id="soundToggle" class="w-12 h-6 bg-grass rounded-full relative transition-colors">
                        <span class="absolute top-1 left-1 w-4 h-4 bg-white rounded-full transition-transform"></span>
                    </button>
                </div>
                <button id="resetGameBtn" class="w-full bg-red-500 hover:bg-red-600 text-white rounded-xl py-3 font-bold transition-all">
                    🗑️ 重置游戏
                </button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed top-20 left-1/2 -translate-x-1/2 bg-black/80 text-white px-6 py-3 rounded-full z-50 transform -translate-y-full opacity-0 transition-all duration-300 pointer-events-none">
        <span id="toastMessage"></span>
    </div>

    <div id="coinAnimation" class="fixed pointer-events-none z-50"></div>

    <script src="js/storage.js"></script>
    <script src="js/crops.js"></script>
    <script src="js/farm.js"></script>
    <script src="js/shop.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
